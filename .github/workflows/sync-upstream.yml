name: Sync Upstream

# Keeps this fork's main branch in step with the upstream project. Runs on a
# schedule (and on demand) so the fork tracks upstream with no manual work.
#
# Each sync lands upstream's new commits as ONE squashed commit on main - no merge
# commit, no second parent. The upstream commit we last integrated is recorded in
# .github/upstream-sync-base, and every run diffs from there: that keeps the merge
# base moving forward so recurring edits (the package.json version on each release,
# most painfully) never look like conflicts.
#
# Fork-owned files (branding.json, app/installer/tray icons - see .gitattributes)
# are always kept on OUR side: they are excluded from the upstream delta, so an
# upstream change to them never flows in and never causes a conflict.
#
# When a sync brings in a package.json version bump, the release build is
# triggered explicitly via workflow_dispatch. We cannot rely on the push trigger
# in build.yml: pushes made with the default GITHUB_TOKEN do not start other
# workflow runs (GitHub's anti-recursion rule). Dispatching is the documented
# exception that IS allowed with GITHUB_TOKEN, and it also handles upstream
# landing several commits at once - which build.yml's HEAD~1 check would miss.

permissions:
  contents: write # push the synced main branch
  actions: write # dispatch build.yml on a version bump
  issues: write # open an issue when a sync conflicts

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

# Never run two syncs at once; let an in-flight sync finish rather than cancel it.
concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: kirisame-meguru/clashapp
  UPSTREAM_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync from upstream
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote get-url upstream >/dev/null 2>&1 || \
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          # Full branch history so we can diff from the commit we last synced, even
          # when that is many releases behind upstream's tip.
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          OLD_VERSION=$(jq -r '.version' package.json)
          PRE=$(git rev-parse HEAD)
          TIP=$(git rev-parse "upstream/${UPSTREAM_BRANCH}")

          # Where we left off last time. Squashing records no merge parent, so
          # git's own merge-base would stay frozen at the fork point and make every
          # later sync re-conflict on lines upstream re-touches across syncs (the
          # package.json version on each release, most painfully). We instead
          # remember the exact upstream commit we last integrated and diff from
          # there, so the base advances every run.
          STATE_FILE=.github/upstream-sync-base
          if [ -f "$STATE_FILE" ] && git cat-file -e "$(cat "$STATE_FILE")^{commit}" 2>/dev/null; then
            BASE=$(cat "$STATE_FILE")
          else
            # First run, or the recorded commit vanished after an upstream rewrite:
            # fall back to where the two histories diverged.
            BASE=$(git merge-base HEAD "upstream/${UPSTREAM_BRANCH}")
          fi

          # Nothing new upstream since we last synced.
          if [ "$BASE" = "$TIP" ]; then
            echo "Already up to date with ${UPSTREAM_REPO}@${UPSTREAM_BRANCH}."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fork-owned paths (branding.json, icons) are never taken from upstream.
          # Excluding them from the delta IS what keeps them ours - an upstream edit
          # to any of them simply isn't in what we apply, so it can't conflict.
          # .gitattributes is the single source of truth for the list.
          PATTERNS=()
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            PATTERNS+=("$pat")
          done < <(grep -E 'merge=ours' .gitattributes | grep -v '^[[:space:]]*#' | awk '{print $1}')
          EXCLUDES=()
          for pat in "${PATTERNS[@]}"; do EXCLUDES+=(":(exclude)$pat"); done
          # package.json is reconciled field-by-field below, never patched. Its fork-owned
          # identity lines sit right next to the version that bumps on every upstream
          # release, so a single diff hunk covers both - and --3way then conflicts on the
          # identity lines every time. Excluding it here keeps it out of the apply (so the
          # sync can't fail on it); the explicit rebuild after the apply keeps our identity
          # and takes the version (and everything else) from upstream.
          EXCLUDES+=(":(exclude)package.json")

          # The squash: upstream's changes since the last sync as one parentless
          # delta - no merge commit. --3way self-heals context drift and reports a
          # real conflict (exit non-zero) only when the fork and upstream edited the
          # same lines of a shared (non-fork-owned) file.
          PATCH="$RUNNER_TEMP/upstream-sync.patch"
          git diff --binary "$BASE" "$TIP" -- . "${EXCLUDES[@]}" > "$PATCH"
          if [ -s "$PATCH" ]; then
            if ! git apply --3way --index --whitespace=nowarn "$PATCH"; then
              git reset --hard "$PRE"
              echo "conflict=true" >> "$GITHUB_OUTPUT"
              echo "::error::Conflict squashing ${UPSTREAM_REPO}@${UPSTREAM_BRANCH} into main."
              exit 1
            fi
          fi

          # Safety net: if a fork-owned pattern slipped past the pathspec exclude,
          # pin those paths back to our pre-sync version.
          for pat in "${PATTERNS[@]}"; do
            git checkout "$PRE" -- "$pat" 2>/dev/null || true
          done

          # Reconcile package.json (excluded from the patch above). Identity fields stay
          # ours; version, dependencies and everything else track upstream. We rebuild the
          # file from upstream's tip with our identity overlaid rather than patching it: the
          # identity lines neighbour the version bump that lands every release, so feeding
          # package.json through `git apply --3way` conflicts on them - and the old
          # post-apply pin never got the chance to run, because that conflict aborted the
          # sync first. The fork only ever customizes these keys; any other package.json
          # field is taken from upstream as-is. version is deliberately NOT pinned, so each
          # upstream release still flows in and triggers the build below.
          PKG_PIN_KEYS='["name","description","author","homepage"]'
          PINNED=$(git show "$PRE:package.json" | jq --argjson keys "$PKG_PIN_KEYS" \
            'with_entries(select(.key as $k | $keys | index($k) != null))')
          RECONCILED=$(git show "$TIP:package.json" | jq --argjson pin "$PINNED" '. + $pin')
          # Compare normalized JSON so we only rewrite (and reformat) on a real content change.
          if [ "$RECONCILED" != "$(jq '.' package.json)" ]; then
            printf '%s\n' "$RECONCILED" > package.json
            git add package.json
            echo "Reconciled package.json: kept fork identity (${PKG_PIN_KEYS}), synced the rest from upstream."
          fi

          # Record how far we have synced so the next run diffs from here. This is
          # always a change (TIP != BASE), so there is always something to commit.
          echo "$TIP" > "$STATE_FILE"
          git add "$STATE_FILE"

          NEW_VERSION=$(jq -r '.version' package.json)
          git commit -m "chore(sync): squash upstream ${UPSTREAM_REPO}@${UPSTREAM_BRANCH} (${TIP:0:12})"
          git push origin HEAD:main

          echo "synced=true" >> "$GITHUB_OUTPUT"
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version bump detected: ${OLD_VERSION:-<none>} -> $NEW_VERSION"
            echo "version_bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Synced with no version change ($NEW_VERSION)."
            echo "version_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger release build on version bump
        if: steps.sync.outputs.version_bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching build.yml to release ${{ steps.sync.outputs.new_version }}."
          # Pin --repo to THIS fork: the sync step added an `upstream` remote, and
          # gh otherwise resolves the base repo to upstream (-> 403, no access).
          gh workflow run build.yml --repo "$GITHUB_REPOSITORY" --ref main -f version="${{ steps.sync.outputs.new_version }}"

      - name: Open issue on sync conflict
        if: failure() && steps.sync.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Don't pile up duplicate issues across failed runs.
          OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search 'in:title "Upstream sync conflict"' --json number --jq 'length')
          if [ "${OPEN:-0}" -gt 0 ]; then
            echo "An open sync-conflict issue already exists; not creating another."
            exit 0
          fi
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Upstream sync conflict with ${UPSTREAM_REPO}@${UPSTREAM_BRANCH}" \
            --body "$(cat <<EOF
          The scheduled **Sync Upstream** workflow could not squash \`${UPSTREAM_REPO}@${UPSTREAM_BRANCH}\` into \`main\` because of a conflict in a non-fork-owned file.

          Fork-owned files (\`branding.json\` and the icons listed in \`.gitattributes\`) are excluded automatically, so this conflict is in a shared source/config file that both sides changed on the same lines.

          **To resolve** (keeps \`main\` linear - no merge commit):
          \`\`\`bash
          git fetch upstream ${UPSTREAM_BRANCH}
          git checkout main
          git merge --squash upstream/${UPSTREAM_BRANCH}
          # resolve conflicts, keeping the fork's branding/changes where appropriate
          git rev-parse upstream/${UPSTREAM_BRANCH} > .github/upstream-sync-base
          git add -A
          git commit -m "chore(sync): squash upstream ${UPSTREAM_REPO}@${UPSTREAM_BRANCH}"
          git push origin main
          \`\`\`

          The \`.github/upstream-sync-base\` line is what tells the next run where to resume; the next scheduled sync picks up automatically once it records upstream's tip. Close this issue after resolving.

          _Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_
          EOF
          )"
